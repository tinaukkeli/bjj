<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BJJ Guard Systems Flowchart</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0e1a;
      --surface: #161929;
      --surface-2: #1e2235;
      --border: #272c45;
      --border-hover: #373e63;
      --text: #dde4f0;
      --muted: #556080;
      --accent: #4ade80;
      --accent-dim: rgba(74,222,128,0.12);
      --accent-glow: rgba(74,222,128,0.22);
      --blue: #38bdf8;
      --blue-dim: rgba(56,189,248,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(12,14,26,0.95);
      backdrop-filter: blur(16px);
      z-index: 50;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .zoom-level {
      font-size: 0.8rem;
      color: var(--muted);
      min-width: 42px;
      text-align: center;
    }

    .btn {
      height: 34px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      font-family: 'Outfit', sans-serif;
      white-space: nowrap;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }
    .btn.icon { width: 34px; padding: 0; font-size: 18px; }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }

    .tab {
      height: 32px;
      padding: 0 16px;
      border-radius: 7px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--muted);
      white-space: nowrap;
      transition: all 0.2s;
      background: transparent;
      font-family: 'Outfit', sans-serif;
    }
    .tab:hover { color: var(--text); border-color: var(--border); }
    .tab.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Canvas viewport ── */
    #viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      user-select: none;
    }
    #viewport.panning { cursor: grabbing; }

    #stage {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    svg#edges {
      position: absolute;
      top: 0; left: 0;
      overflow: visible;
      pointer-events: none;
    }

    /* ── Nodes ── */
    .node {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.22s, background 0.22s, box-shadow 0.22s, transform 0.22s;
    }
    .node:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 20px var(--accent-glow), 0 8px 24px rgba(0,0,0,0.45);
      transform: translateY(-2px);
      z-index: 20;
    }
    .node.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0c0e1a;
      box-shadow: 0 0 28px var(--accent-glow);
      z-index: 20;
    }
    .node.active .node-sub { color: rgba(12,14,26,0.65); }

    .node.root {
      border-color: rgba(56,189,248,0.45);
      background: var(--blue-dim);
      font-weight: 600;
    }
    .node.root:hover {
      border-color: var(--blue);
      background: rgba(56,189,248,0.18);
      box-shadow: 0 0 20px rgba(56,189,248,0.2), 0 8px 24px rgba(0,0,0,0.45);
    }
    .node.category {
      border-color: rgba(255,255,255,0.1);
      background: #1a1e30;
    }

    .node-label {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .node-sub {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.2;
    }

    /* ── SVG edges ── */
    .edge {
      fill: none;
      stroke: var(--border);
      stroke-width: 1.5;
      transition: stroke 0.25s;
    }
    .edge.lit { stroke: var(--accent); }

    /* ── Hint ── */
    .hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.75rem;
      pointer-events: none;
      white-space: nowrap;
      letter-spacing: 0.01em;
    }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s;
      z-index: 300;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 16px;
      padding: 32px;
      max-width: 560px;
      width: 90%;
      max-height: 78vh;
      overflow-y: auto;
      box-shadow: 0 32px 80px rgba(0,0,0,0.72);
      position: relative;
      transform: translateY(16px) scale(0.97);
      transition: transform 0.28s cubic-bezier(0.25,0.8,0.25,1);
    }
    .overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-close {
      position: absolute;
      top: 18px; right: 18px;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { color: white; transform: rotate(90deg); }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 14px;
      padding-right: 36px;
      line-height: 1.25;
    }
    .modal-body {
      color: #b8c5d6;
      line-height: 1.78;
      font-size: 0.97rem;
    }
    .modal-body ol, .modal-body ul {
      margin-top: 12px;
      padding: 14px 14px 14px 30px;
      background: rgba(0,0,0,0.22);
      border-radius: 8px;
    }
    .modal-body li { margin-bottom: 9px; }
    .modal-body li:last-child { margin-bottom: 0; }
    .modal-body b { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo">BJJ Guard Systems</div>
  <div class="header-right">
    <button class="btn icon" id="btnZoomIn" title="Zoom in">+</button>
    <span class="zoom-level" id="zoomLabel">100%</span>
    <button class="btn icon" id="btnZoomOut" title="Zoom out">−</button>
    <button class="btn" id="btnFit">Fit</button>
  </div>
</header>

<div class="tab-bar" id="tabBar"></div>

<div id="viewport">
  <div id="stage">
    <svg id="edges"></svg>
  </div>
  <p class="hint">Scroll to zoom · Drag to pan · Click a node for details</p>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const SYSTEMS = {
  half_guard: {
    label: 'Half Guard',
    tree: {
      id: 'hg_root', label: 'Half Guard', type: 'root',
      info: { title: 'Half Guard – Core Concepts', body: `<b>Goal:</b> Prevent the opponent from flattening you and create angles or distance for attacks.<br><br><b>Key details:</b><ul><li><b>Side position:</b> Always stay tight on your side. Shoulders on the mat = danger.</li><li><b>Frames:</b> Keep your top arm across their chest or shoulder to resist their weight.</li><li><b>Bottom arm:</b> Actively block the crossface with your bicep or wrist.</li></ul>From here you choose your direction based on where they give weight or leave space.` },
      children: [
        {
          id: 'knee_shield', label: 'Knee Shield', sub: 'Z-Guard / Distance', type: 'category',
          info: { title: 'Knee Shield / Z-Guard', body: `<b>Direction:</b> Distance management and stopping the pass.<br><br><b>How to enter:</b><ol><li><b>Shield:</b> Drive your top knee into their chest or bicep (Z-shape).</li><li><b>Bottom hook:</b> Control their hip or inner thigh with your lower leg.</li><li><b>Frames:</b> Maintain stiff arms to keep pressure off your upper body.</li></ol><b>Note:</b> Great home base against larger opponents before transitioning to close combat.` },
          children: [
            { id: 'ks_arm_drag', label: 'Arm Drag', info: { title: 'Arm Drag to Back', body: `<b>Scenario:</b> Opponent leans into your shield or reaches for your collar/face.<br><br><b>Execution:</b><ul><li>Cross-grip their reaching sleeve or wrist with same-side hand.</li><li>Pull their arm sharply across your chest while opening your shield knee.</li><li>Use the momentum to climb up and around directly to their back.</li></ul>` } },
            { id: 'ks_dogfight', label: 'Dogfight Entry', info: { title: 'Transition to Dogfight', body: `<b>Scenario:</b> Opponent stalls on your shield or sits back; you want to convert distance to close combat.<br><br><b>Execution:</b><ul><li>Drop the knee shield quickly past their thigh.</li><li>Shoot your outer arm deep into their armpit (underhook) in the same motion.</li><li>Rise elbow → hand → knee = Dogfight.</li></ul>` } },
            { id: 'ks_john_wayne', label: 'John Wayne Sweep', info: { title: 'John Wayne Sweep (Knee Lever)', body: `<b>Scenario:</b> Opponent drives heavy pressure into your shield trying to collapse it.<br><br><b>Execution:</b><ul><li>Lock both legs around their passing leg tightly (ankle-to-ankle).</li><li>Grip their near sleeve with both hands (2-on-1).</li><li>Shoot your hips along the mat and lever their knee sharply to the side — the knee is the fulcrum that takes away all their base.</li></ul>` } },
          ]
        },
        {
          id: 'kimura_trap', label: 'Kimura Trap', sub: 'Upper body control', type: 'category',
          info: { title: 'Kimura Trap System', body: `<b>Direction:</b> Upper body attack against whizzers, low passes, or posted hands.<br><br><b>How to enter:</b><ol><li><b>Grip:</b> Same-side hand grabs their wrist. Wrap your other arm over-and-under and grip your own wrist (figure-4 / kimura lock).</li><li><b>Connect:</b> Pull the lock tight to your chest — never let it float away from your frame.</li></ol><b>Note:</b> One of the strongest controls in BJJ. Usable as a submission or as a forcing handle for sweeps.` },
          children: [
            { id: 'kt_sweep', label: 'Kimura Sweep', info: { title: 'Kimura Sweep', body: `<b>Scenario:</b> You have the Kimura but they sit heavy with a wide base.<br><br><b>Execution:</b><ul><li>Lock your legs tight across their lower back or insert a butterfly hook.</li><li>Drive their arm via the lock toward their armpit and back, creating a rigid lever.</li><li>Use your full body and hooks to throw them sideways onto their shoulder.</li></ul>` } },
            { id: 'kt_roll', label: 'Roll to Back', info: { title: 'Roll to Back / Tarikoplata', body: `<b>Scenario:</b> Opponent drives forward heavily to prevent the Kimura sweep.<br><br><b>Execution:</b><ul><li>Redirect pressure by sliding your head under their weight toward the mat.</li><li>Maintain the Kimura lock and roll over your low shoulder and neck.</li><li>You emerge directly to back control, or Tarikoplata opens by stepping your leg over their arm.</li></ul>` } },
            { id: 'kt_finish', label: 'Submission', info: { title: 'Kimura Submission', body: `<b>Scenario:</b> Opponent's arm drifts too far from their body or they extend cross-body.<br><br><b>Execution:</b><ul><li>Roll to your back, throw your top leg over their lower back to prevent rollout.</li><li>Use a butterfly hook on the far side to angle them correctly.</li><li>Small rotation driving their wrist toward their upper back — tap.</li></ul>` } },
          ]
        },
        {
          id: 'butterfly_half', label: 'Butterfly Half', sub: 'Elevation / Lift', type: 'category',
          info: { title: 'Butterfly Half Guard', body: `<b>Direction:</b> Stop forward pressure and destroy their base using elevation.<br><br><b>How to enter:</b><ol><li>Create space with a shrimp or capitalize when they lean forward.</li><li>Insert the free leg inside their thighs as a butterfly hook (instep on inner thigh).</li><li>Pump the hook to keep their weight unbalanced every time they push in.</li></ol>` },
          children: [
            { id: 'bh_sweep', label: 'Butterfly Sweep', info: { title: 'Butterfly Sweep', body: `<b>Scenario:</b> Opponent drives over you with heavy pressure trying to flatten you.<br><br><b>Execution:</b><ul><li>Tight overhook with your head-side arm; underhook or head control with your far arm.</li><li>Fall generously to the underhook side.</li><li>Kick and lift the butterfly hook diagonally upward — like a leg press to the ceiling.</li><li>Follow through directly to mount, maintaining your grips through the rotation.</li></ul>` } },
            { id: 'bh_slx', label: 'Single Leg X Entry', info: { title: 'Transition to Single Leg X (Ashi Garami)', body: `<b>Scenario:</b> Opponent widens stance or drives backward, countering the sweep.<br><br><b>Execution:</b><ul><li>Use the hook to only partially elevate (weight reduction, not full lift).</li><li>Slip the lower hook deep between their legs, placing your instep on the outside of their far leg.</li><li>Press your other foot on the back side of that same leg — strong SLX position opening all leg attacks and stand-up sweeps.</li></ul>` } },
          ]
        },
        {
          id: 'rdlr', label: 'RDLR', sub: 'Reverse De La Riva', type: 'category',
          info: { title: 'Reverse De La Riva (RDLR)', body: `<b>Direction:</b> Half Guard's answer when the opponent stands to knee-slice past you.<br><br><b>How to enter:</b><ol><li>Opponent pops to standing, creating a dynamic knee slice threat.</li><li>Flatten your upper body. Wrap your inner (lower) half guard leg around the outside of their passing leg to their far hamstring.</li><li>Place your free foot sole on their hip — pressure and distance control.</li></ol>` },
          children: [
            { id: 'rdlr_kiss', label: 'Kiss of the Dragon', info: { title: 'Kiss of the Dragon', body: `<b>Scenario:</b> Opponent drives forward, putting the RDLR hook under heavy pressure.<br><br><b>Execution:</b><ul><li>Release your hip-control foot, let them come slightly forward, and grip their far ankle from below.</li><li>Use the RDLR hook as a fulcrum to invert your hips toward the ceiling between their legs.</li><li>Rotate your body around their leg — you emerge directly behind them for a back take.</li></ul>` } },
            { id: 'rdlr_tripod', label: 'Tripod Sweep', info: { title: 'Tripod Sweep', body: `<b>Scenario:</b> Opponent is cautious, weight back in a long stance, trying to pry open your hook.<br><br><b>Execution:</b><ul><li>Cross-grip their far ankle tightly.</li><li>RDLR hook props one side; your other foot posts across their near hip/shin.</li><li>Kick downward sharply from your hip while pulling the ankle up — removes their tripod base and tips them backward.</li></ul>` } },
          ]
        },
        {
          id: 'dogfight', label: 'Dogfight', sub: 'Underhook', type: 'category',
          info: { title: 'Dogfight (Underhook Route)', body: `<b>Direction:</b> Under the armpit. Works when opponent leaves their near arm open.<br><br><b>How to enter:</b><ol><li><b>Underhook:</b> Shoot outer arm deep under their armpit, grip their lat or belt. Keep your head tight to their chest/jaw — protection from guillotines.</li><li><b>Bottom arm control:</b> Hold their far arm or knee to prevent crossface.</li><li><b>Rise:</b> Pull your bottom leg back under your hips → up to elbow → hand → knee = Dogfight.</li></ol>` },
          children: [
            { id: 'df_knee_tap', label: 'Knee Tap Sweep', info: { title: 'Knee Tap Sweep', body: `<b>Scenario:</b> Opponent pushes toward you (giving back-pressure) in Dogfight.<br><br><b>Execution:</b><ul><li>Release your bottom hand from mat (squeeze underhook harder), reach long to their far knee.</li><li>Block (tap) that knee in place so they can't step back.</li><li>Drive forward with your underhook and full body weight, head under their chin/chest.</li><li>Keep the underhook through the fall — strong top position, not their guard.</li></ul>` } },
            { id: 'df_roll_under', label: 'Roll Under', info: { title: 'Roll Under Sweep', body: `<b>Scenario:</b> Opponent squeezes a strong whizzer/overhook on your underhook arm, pressing your shoulder toward the mat.<br><br><b>Execution:</b><ul><li>Don't fight the pressure — change direction. Dive your head downward under their center (chest).</li><li>Grip their near leg (thigh or ankle) with your bottom hand. Drive underhook arm deeper toward crotch.</li><li>Roll sideways over your own shoulder.</li><li>The roll uses their forward whizzer pressure to make them weightless — guide them to their back and come on top.</li></ul>` } },
            { id: 'df_back_take', label: 'Back Take', info: { title: 'Back Take from Dogfight', body: `<b>Scenario:</b> Opponent tries to escape by leaning backward or pulling their arm off your underhook.<br><br><b>Execution:</b><ul><li>Their weight escaping backward — pull yourself with underhook (or arm drag) tighter to their back.</li><li>Reach far arm around their far hip (belt/shorts) for dual-point control.</li><li>Slip quickly behind them, insert first hook at the hip.</li><li>Seatbelt first (one arm over shoulder, one under armpit) before chasing the second hook — prevents escape.</li></ul>` } },
          ]
        },
        {
          id: 'octopus', label: 'Octopus / 2.0', sub: 'Outside / Overhook', type: 'category',
          info: { title: 'Octopus / Octopus 2.0 (Overhook Route)', body: `<b>Direction:</b> Over and outside. Works when they try a crossface, leaving the outer side open.<br><br><b>How to enter:</b><ol><li><b>Octopus Grip:</b> Slide under their weight. Reach with your head-side arm far over their back to their far armpit/flank. You are now diagonal behind their back.</li><li><b>Octopus 2.0 (Butterfly Hook):</b> Slightly lift your hip and slip the bottom leg between their legs, placing a butterfly hook (instep) on their inner thighs.</li></ol><b>Note:</b> This hook + back grip is a devastating combination — the hook carries their weight making them light and easy to rotate.` },
          children: [
            { id: 'oct_back_take', label: 'Back Take', info: { title: 'Back Take from Octopus', body: `<b>Scenario:</b> Opponent freezes or leans forward, not reacting to the Octopus grip fast enough.<br><br><b>Execution:</b><ul><li>Octopus grip already has you partially behind them — continue the motion upward.</li><li>Use the butterfly hook to slightly elevate their hip, making space for your bottom knee to slide under to their back.</li><li>Throw your outer leg over their hip (twister hook) or climb straight to seatbelt back control.</li></ul>` } },
            { id: 'oct_hip_bump', label: 'Hip Bump Sweep', info: { title: 'Hip Bump Sweep (Octopus)', body: `<b>Scenario:</b> Opponent panics at the Octopus threat, retreats quickly facing forward, raising their upper body.<br><br><b>Execution:</b><ul><li>As they raise their weight up and back, their base lifts off the mat.</li><li>Maintain tight grip around their waist. Sit up sharply with them.</li><li>Drive your hip hard into their side (hip bump).</li><li>You are behind them with their arm trapped — they can't post a hand. Follow directly to mount.</li></ul>` } },
            { id: 'oct_hook_sweep', label: 'Hook Sweep', sub: '(needs 2.0 hook)', info: { title: 'Hook Sweep (Octopus 2.0)', body: `<b>Scenario:</b> Opponent drives their chest heavily downward to restore normal half guard pressure.<br><br><b>Execution:</b><ul><li>Don't push back — use the butterfly hook instead.</li><li>Fall back to your low shoulder, pull them tighter with the Octopus grip.</li><li>Simultaneously lift with the butterfly hook — elevating their hip up and to the side.</li><li>Guide their upper body (Octopus grip) over your head to their back. Follow on top.</li></ul>` } },
            { id: 'oct_no_hook', label: 'Kosoto Hook', sub: '(outer leg, no butterfly)', info: { title: 'Kosoto Hook (Classic Octopus – No Butterfly Hook)', body: `<b>Context:</b> You have the Octopus back-grip but haven't inserted (or can't insert) the butterfly hook. Instead, your free top leg hooks <i>outside</i> their far leg behind the knee — a Ko-soto style hook that achieves the same leverage from the outside.<br><br><b>How to set the Kosoto hook:</b><ol><li>From the Octopus grip position, swing your top (free) leg over and hook your foot/heel behind their far knee from the outside.</li><li>This traps their leg between your hook and their own body — they cannot step that leg away.</li><li>Maintain the Octopus back grip tightly. You now control both their upper body (via grip) and their far leg (via hook).</li></ol><b>What to do from here:</b><ul><li><b>Ko-soto reap (Sweep):</b> Drive forward with your Octopus grip pulling them over their trapped leg. The hook reaps the knee backward while your body weight comes forward — they tip sideways/backward and you follow directly on top.</li><li><b>Back take:</b> Use the hook to lift and unweight their far leg slightly. Slip your bottom knee through behind them and climb to the back. The Kosoto hook clears space that the butterfly hook would otherwise create.</li><li><b>Stand up to outside single leg:</b> Rise to your knees keeping the Octopus grip, convert the knee hook into a standard outside single-leg (ankle pick or full finish).</li></ul><b>Key difference vs. butterfly hook:</b> Butterfly lifts from the inside → good for elevation sweeps. Kosoto blocks/reaps from the outside → better for forward/sideways driving and takedown-style finishes.` } },
          ]


        },
        {
          id: 'far_leg', label: 'Far Leg Attack', sub: 'Deep Half / Go Under', type: 'category',
          info: { title: 'Far Leg Attack (Deep Half Guard)', body: `<b>Direction:</b> Fully beneath them (Deep Half). Works against heavy stacking or standing passes.<br><br><b>How to enter:</b><ol><li>Use frames to bait forward pressure. Slide directly under their center of mass — "Homer Simpson" style (flat along the mat).</li><li>Turn your body perpendicular. Hide your head behind their far hamstring/calf — protected from guillotines.</li><li>Grip their far leg (knee or thigh) with both hands. Trap their near leg with your legs. Now you can manipulate their balance from fully beneath them.</li></ol>` },
          children: [
            { id: 'fl_waiter', label: 'Waiter Sweep', info: { title: 'Waiter Sweep', body: `<b>Scenario:</b> Opponent's weight is directly above or slightly back, trying to maintain balance.<br><br><b>Execution:</b><ul><li>Grip the back of their far knee (the Waiter Grip).</li><li>Position your legs to compress their other thigh (pendulum / X-guard style).</li><li>Lift the far leg and your hip straight up toward the ceiling — like a waiter holding a large tray on one hand.</li><li>As their balance disrupts, swing your hip and pull the lower leg, tilting them off to the side or back. Rise on top.</li></ul>` } },
            { id: 'fl_old_school', label: 'Old School / Homer', info: { title: 'Old School / Homer Simpson', body: `<b>Scenario:</b> Opponent sits very heavy with a wide base preventing lifting sweeps.<br><br><b>Execution:</b><ul><li>Cross-body reach with your lower arm — grab the toes of their near leg (the one trapped between yours).</li><li>Switch to lockdown and pull their toes tight with a back-heel pull to your own glute.</li><li>Turn face-down hard, come up to your knees in one smooth rolling motion forward.</li><li>The toe grip destroys their ability to post. Drive them backward/sideways and rise to Side Control.</li></ul>` } },
            { id: 'fl_x_guard', label: 'X-Guard Entry', info: { title: 'X-Guard Transition', body: `<b>Scenario:</b> Opponent resists by spreading their far leg wide or rising to stand with solid balance.<br><br><b>Execution:</b><ul><li>Shoot your inner leg (was trapping them in half) very deep between their legs. Hook their far thigh/behind.</li><li>Place your other foot on their near hip — X-Guard setup. You are now under their center of mass.</li><li>X hooks allow you to stretch them further and execute a technical stand-up sweep, dumping them backward.</li></ul>` } },
          ]
        },
      ]
    }
  },

  standing: {
    label: 'Standing Game',
    tree: {
      id: 'st_root', label: 'Standing', type: 'root',
      info: { title: 'Standing Game – Core Concepts', body: `<b>Goal:</b> Control distance and off-balance the opponent to score a takedown or pull guard from a dominant position.<br><br><b>Three main weapons:</b><ul><li><b>Arm Drag</b> — get behind them using hand speed</li><li><b>Standing Kimura Grip</b> — 2-on-1 control that strips their offense and opens throws or takedowns</li><li><b>Single Leg</b> — low-risk, high-reward takedown that chains with both above</li></ul>After the takedown: settle into Top Half Guard (controlled grind) or cut straight through with a Knee Slide pass.` },
      children: [
        {
          id: 'arm_drag', label: 'Arm Drag', sub: 'Hand speed → back', type: 'category',
          info: { title: 'Arm Drag System', body: `<b>Goal:</b> Redirect their arm with hand speed and slip behind them before they can react.<br><br><b>Basic Arm Drag:</b><ol><li>Cross-grip their wrist with your same-side hand.</li><li>Simultaneously hook behind their tricep/elbow with your other hand.</li><li>Yank their arm sharply across your center — pull, don't push.</li><li>Step behind immediately. Seatbelt → takedown from the back.</li></ol><b>Key:</b> The step and the yank must happen at the same time. Pull first then step and they recover.` },
          children: [
            { id: 'ad_back_take', label: 'Back Take → Takedown', info: { title: 'Arm Drag → Back Take → Takedown', body: `<b>Execution:</b><ul><li>After the drag, step tight behind them and secure a seatbelt immediately (top arm over shoulder, bottom arm under armpit).</li><li>Drive them forward or trip their near ankle (osoto / outside trip) to bring them to the mat.</li><li>Follow directly to back control — insert hooks or transition to rear mount.</li></ul>` } },
            { id: 'ad_circle_post', label: 'Circle & Post Bait', info: { title: 'Circle & Post on Shoulder (Reaction Bait)', body: `<b>Concept:</b> Move laterally and post your hand on their far shoulder. This forces a defensive reaction — the moment they try to remove your hand or turn toward you, their arm is exposed.<br><br><b>Execution:</b><ul><li>Step to the side, post your palm on the back of their far shoulder.</li><li>Wait — when they move their hand to remove yours, instantly cross-grip their wrist and execute the arm drag.</li><li>This creates a predictable, high-percentage entry (kuzushi by reaction).</li></ul>` } },
          ]
        },
        {
          id: 'kimura_stand', label: 'Standing Kimura', sub: '2-on-1 figure-4', type: 'category',
          info: { title: 'Standing Kimura Grip', body: `<b>Goal:</b> A 2-on-1 figure-four grip that strips their attacking arm and gives multiple finishes.<br><br><b>How to grip:</b><ol><li>Cross-grip their wrist with your same-side hand.</li><li>Wrap your other arm over-and-under their arm, gripping your own wrist (figure-4).</li><li>Pin the lock tightly to your own chest — never let it float free.</li></ol><b>Key principle:</b> With this grip they cannot punch, collar grip, or shoot. You control the entire exchange.` },
          children: [
            { id: 'kst_takedown', label: 'Kimura Takedown', info: { title: 'Kimura Takedown (Shoulder Crank to Mat)', body: `<b>Execution:</b><ul><li>Once the grip is locked to your chest, rotate your whole body and drive their elbow/shoulder toward the mat.</li><li>Opponent typically rolls under the pressure or turtles.</li><li>Follow to the back or Top Half Guard depending on landing.</li></ul>` } },
            { id: 'kst_sumi', label: 'Sumi Gaeshi', info: { title: 'Sumi Gaeshi (Sacrifice Throw)', body: `<b>Scenario:</b> Opponent resists the Kimura takedown by raising their hips and posturing up.<br><br><b>Execution:</b><ul><li>Don't fight the posture — use it. Sit straight down under their hips while keeping the Kimura grip.</li><li>Place one or both butterfly hooks on their thighs.</li><li>Throw them cleanly over your head. Follow on top to mount.</li></ul>` } },
            { id: 'kst_single', label: 'Drop to Single Leg', info: { title: 'Standing Kimura → Single Leg', body: `<b>Scenario:</b> Opponent's upper body is occupied fighting the grip — their front leg is unguarded.<br><br><b>Execution:</b><ul><li>Jerk their arm down and forward with the Kimura grip to break their posture and load their lead leg.</li><li>Change levels instantly and shoot the now-weighted leg.</li><li>Already inside their arm — guillotine risk is low. Finish with a standard single leg.</li></ul>` } },
            { id: 'kst_armlock', label: 'Armlock', info: { title: 'Standing Armlock (Straight or Bent)', body: `<b>Scenario:</b> Opponent resists with a stiff straight arm or their elbow is bent into a crankable position.<br><br><b>Execution:</b><ul><li><b>Straight arm:</b> Step under the elbow and lever upward against the joint (ude gatame).</li><li><b>Bent arm (Kimura):</b> Crank the figure-4 behind their back — finish standing or take them to the mat first.</li></ul>` } },
          ]
        },
        {
          id: 'single_leg', label: 'Single Leg', sub: 'Level change', type: 'category',
          info: { title: 'Single Leg Takedown', body: `<b>Goal:</b> Low-risk takedown that chains naturally with both Arm Drag and Standing Kimura.<br><br><b>Entries:</b><ol><li><b>Direct level change:</b> Spring off your knees and shoot directly to the lead leg — head on inside to protect from guillotines.</li><li><b>Arm Drag fake:</b> Start the arm drag; when they yank their hand back (loading the lead leg), immediately shoot the single.</li><li><b>Kimura drop:</b> Yank the Kimura grip down to load their lead leg, then shoot.</li></ol>` },
          children: [
            { id: 'sl_run_pipe', label: 'Run the Pipe', info: { title: 'Run the Pipe (Single Leg Finish)', body: `<b>Scenario:</b> You have the single leg secured with head inside, opponent is hopping.<br><br><b>Execution:</b><ul><li>Drive forward into them — "running the pipe" — making them back-pedal unsustainably.</li><li>When their base leg slips or they over-commit backward, drive their leg across your body to the mat.</li><li>Finish in Top Half Guard or cut straight to Knee Slide.</li></ul>` } },
            { id: 'sl_trip', label: 'Outside Trip', info: { title: 'Outside Trip / Ankle Pick', body: `<b>Scenario:</b> Opponent sprawls or steps back, getting their hips away from you.<br><br><b>Execution:</b><ul><li>As they step back with their base leg, reach low with your outside arm and pick their ankle.</li><li>Drive forward with your body weight simultaneously — they tip backward with no base.</li><li>Land in Top Half Guard or Side Control.</li></ul>` } },
          ]
        },
        {
          id: 'after_takedown', label: 'After Takedown', sub: 'Settle or cut', type: 'category',
          info: { title: 'Takedown Finish & Passing', body: `<b>Immediate decision:</b> The moment opponent hits the mat, choose one path:<br><br><b>1. Settle → Top Half Guard</b> — Stabilize, apply top pressure, grind a controlled pass.<br><b>2. Cut immediately → Knee Slide</b> — Use the takedown momentum before they can set frames.` },
          children: [
            { id: 'td_half_guard', label: 'Top Half Guard', info: { title: 'Settle into Top Half Guard', body: `<b>When:</b> Opponent landed defensively, has a frame, or you want a controlled stable pass.<br><br><b>Execution:</b><ul><li>Drop into Top Half Guard — control their hip with your knee and establish a crossface.</li><li>This prevents a quick scramble escape and lets you build crushing top pressure.</li><li>From Top Half: grind to Side Control, hunt for Kimura/D'arce traps, or wait for the Knee Slide opening.</li></ul>` } },
            { id: 'td_knee_slide', label: 'Knee Slide Pass', sub: 'Use the momentum', info: { title: 'Knee Slide / Knee Cut Pass', body: `<b>When:</b> Opponent hasn't set frames yet — immediately after the takedown before they recover.<br><br><b>Three finishes:</b><ul><li><b>Standard Knee Slide → Side Control:</b> Drive your knee hard through between their thigh and hip. Crossface to prevent turning, slide through to Side Control.</li><li><b>Knee Slide to Mount:</b> If their hips are flat and legs aren't blocking, slide the cut all the way past and take Mount directly — skip Side Control.</li><li><b>Knee Slide → Back Take:</b> When they turn toward you in desperation, dive directly behind them, hook the near leg (twister hook), and seatbelt — secure the back.</li></ul>` } },
          ]
        },
      ]
    }
  }
};

// ─────────────────────────────────────────────
// LAYOUT  (left-to-right, computed in JS)
// ─────────────────────────────────────────────
const NW   = 160;   // node width
const NH   = 60;    // node height estimate for layout
const HGAP = 200;   // horizontal gap between levels
const VGAP = 20;    // vertical gap between siblings
const PAD  = 48;    // canvas edge padding

function layoutTree(node, depth, cursor) {
  node._depth = depth;
  node._x = PAD + depth * (NW + HGAP);

  if (!node.children || node.children.length === 0) {
    node._y = cursor;
    node._span = NH + VGAP;
    return node._span;
  }

  let cur = cursor;
  let totalSpan = 0;
  for (const c of node.children) {
    const s = layoutTree(c, depth + 1, cur);
    cur += s;
    totalSpan += s;
  }

  const first = node.children[0];
  const last  = node.children[node.children.length - 1];
  const childrenMidTop    = first._y + NH / 2;
  const childrenMidBottom = last._y  + NH / 2;
  node._y = (childrenMidTop + childrenMidBottom) / 2 - NH / 2;
  node._span = totalSpan;
  return totalSpan;
}

function flattenTree(node, list = []) {
  list.push(node);
  if (node.children) node.children.forEach(c => flattenTree(c, list));
  return list;
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
let activeEl  = null;
let currentSys = null;

function renderSystem(key) {
  currentSys = key;
  const sys   = SYSTEMS[key];
  const stage = document.getElementById('stage');
  const svg   = document.getElementById('edges');

  // clear previous nodes (keep svg alive)
  stage.querySelectorAll('.node').forEach(n => n.remove());
  svg.innerHTML = '';
  activeEl = null;

  layoutTree(sys.tree, 0, PAD);
  const nodes = flattenTree(sys.tree);

  // canvas bounds
  const maxX = Math.max(...nodes.map(n => n._x)) + NW + PAD;
  const maxY = Math.max(...nodes.map(n => n._y)) + NH + PAD;
  stage.style.width  = maxX + 'px';
  stage.style.height = maxY + 'px';
  svg.setAttribute('width',   maxX);
  svg.setAttribute('height',  maxY);

  // draw edges
  function drawEdges(node) {
    if (!node.children) return;
    const x1 = node._x + NW;
    const y1 = node._y + NH / 2;
    node.children.forEach(child => {
      const x2 = child._x;
      const y2 = child._y + NH / 2;
      const mx = x1 + (x2 - x1) * 0.5;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
      path.classList.add('edge');
      path.id = `e-${node.id}-${child.id}`;
      svg.appendChild(path);
      drawEdges(child);
    });
  }
  drawEdges(sys.tree);

  // draw nodes
  nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'node' + (n.type === 'root' ? ' root' : n.type === 'category' ? ' category' : '');
    el.id = 'nd-' + n.id;
    el.style.left   = n._x + 'px';
    el.style.top    = n._y + 'px';
    el.style.width  = NW  + 'px';
    el.style.minHeight = NH + 'px';
    el.innerHTML = `<span class="node-label">${n.label}</span>${n.sub ? `<span class="node-sub">${n.sub}</span>` : ''}`;

    if (n.info) {
      el.addEventListener('click', e => {
        e.stopPropagation();
        openModal(n, el);
      });
    }
    stage.appendChild(el);
  });

  fitScreen(false);
}

// ─────────────────────────────────────────────
// PAN & ZOOM
// ─────────────────────────────────────────────
let scale  = 1;
let tx     = 0;
let ty     = 0;
let dragging = false;
let dragStart= { x: 0, y: 0 };

function applyTransform(anim = false) {
  const stage = document.getElementById('stage');
  stage.style.transition = anim ? 'transform 0.38s cubic-bezier(0.25,0.8,0.25,1)' : 'none';
  stage.style.transform  = `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
}

function fitScreen(anim = true) {
  const vp   = document.getElementById('viewport');
  const stage= document.getElementById('stage');
  const vw   = vp.clientWidth;
  const vh   = vp.clientHeight;
  const cw   = parseFloat(stage.style.width)  || stage.scrollWidth;
  const ch   = parseFloat(stage.style.height) || stage.scrollHeight;
  const pad  = 56;
  scale = Math.min((vw - pad * 2) / cw, (vh - pad * 2) / ch, 1);
  tx = (vw - cw * scale) / 2;
  ty = (vh - ch * scale) / 2;
  applyTransform(anim);
}

function doZoom(factor, cx, cy) {
  const vp   = document.getElementById('viewport');
  const rect = vp.getBoundingClientRect();
  const px   = (cx !== undefined ? cx : rect.left + rect.width  / 2) - rect.left;
  const py   = (cy !== undefined ? cy : rect.top  + rect.height / 2) - rect.top;
  const prev = scale;
  scale = Math.max(0.15, Math.min(3.5, scale * factor));
  tx   += px - px * (scale / prev);
  ty   += py - py * (scale / prev);
  applyTransform(false);
}

// Wheel
document.getElementById('viewport').addEventListener('wheel', e => {
  e.preventDefault();
  doZoom(e.deltaY < 0 ? 1.12 : 0.88, e.clientX, e.clientY);
}, { passive: false });

// Drag
const vp = document.getElementById('viewport');
vp.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  dragging  = true;
  dragStart = { x: e.clientX - tx, y: e.clientY - ty };
  vp.classList.add('panning');
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = e.clientX - dragStart.x;
  ty = e.clientY - dragStart.y;
  applyTransform(false);
});
document.addEventListener('mouseup', () => {
  dragging = false;
  vp.classList.remove('panning');
});

// Touch pan (single finger)
let touchStart = null;
vp.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX - tx, y: e.touches[0].clientY - ty };
  }
}, { passive: true });
vp.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && touchStart) {
    tx = e.touches[0].clientX - touchStart.x;
    ty = e.touches[0].clientY - touchStart.y;
    applyTransform(false);
  }
}, { passive: true });

// Buttons
document.getElementById('btnZoomIn').onclick  = () => doZoom(1.2);
document.getElementById('btnZoomOut').onclick = () => doZoom(0.8);
document.getElementById('btnFit').onclick     = () => fitScreen(true);

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tabBar');
  Object.entries(SYSTEMS).forEach(([key, sys]) => {
    const btn = document.createElement('button');
    btn.className    = 'tab';
    btn.textContent  = sys.label;
    btn.dataset.key  = key;
    btn.onclick      = () => selectSystem(key);
    bar.appendChild(btn);
  });
}

function selectSystem(key) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.key === key));
  renderSystem(key);
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(node, el) {
  if (activeEl) activeEl.classList.remove('active');
  el.classList.add('active');
  activeEl = el;
  document.getElementById('modalTitle').innerHTML = node.info.title;
  document.getElementById('modalBody').innerHTML  = node.info.body;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  if (activeEl) { activeEl.classList.remove('active'); activeEl = null; }
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.getElementById('modalClose').onclick = closeModal;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildTabs();
selectSystem('half_guard');
window.addEventListener('resize', () => fitScreen(false));
</script>
</body>
