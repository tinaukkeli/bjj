<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BJJ Guard Systems</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0c0e1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BJJ">
  <link rel="apple-touch-icon" href="icon-512.png">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">BJJ Guard Systems</div>
  <div class="header-right">
    <button class="btn icon" id="btnZoomIn" title="Zoom in">+</button>
    <span class="zoom-level" id="zoomLabel">100%</span>
    <button class="btn icon" id="btnZoomOut" title="Zoom out">−</button>
    <button class="btn" id="btnFit">Fit</button>
  </div>
</header>

<div class="tab-bar" id="tabBar"></div>

<div id="viewport">
  <div id="stage">
    <svg id="edges"></svg>
  </div>
  <p class="hint" id="hint">Pinch to zoom · Drag to pan · Tap a node</p>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/bjj/sw.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW ref failed', err));
    });
  }
</script>
</body>
</html>
